# docker-compose.yml — ambiente LOCAL para testes
  # NAO usar em producao. Em producao, use a Stack do Portainer.
  version: "3.9"

  services:
    postgres:
      image: postgres:16-alpine
      container_name: carteirinha_postgres_local
      restart: unless-stopped
      environment:
        POSTGRES_DB: carteirinha_db
        POSTGRES_USER: carteirinha_user
        POSTGRES_PASSWORD: carteirinha_pass
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U carteirinha_user -d carteirinha_db"]
        interval: 5s
        timeout: 5s
        retries: 10
      networks:
        - carteirinha_net

    app:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: carteirinha_app_local
      restart: unless-stopped
      depends_on:
        postgres:
          condition: service_healthy
      environment:
        DB_HOST: postgres
        DB_PORT: 5432
        DB_NAME: carteirinha_db
        DB_USER: carteirinha_user
        DB_PASSWORD: carteirinha_pass
        DB_SSL: "false"
        PORT: 3300
        NODE_ENV: production
      ports:
        - "3300:3300"
      networks:
        - carteirinha_net

  volumes:
    postgres_data:

  networks:
    carteirinha_net:
  